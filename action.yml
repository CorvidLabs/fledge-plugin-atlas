name: "Atlas report"
description: "Render a repo's spec coverage as badges and standalone SVG components, and expose the numbers as outputs."
author: "CorvidLabs"
branding:
  icon: "map"
  color: "green"

inputs:
  path:
    description: "Project root to analyze."
    required: false
    default: "."
  output-dir:
    description: "Directory to write atlas.json, the shields endpoint badges, the SVG components, and the coverage history into."
    required: false
    default: "atlas"
  components:
    description: "Space-separated SVG components to render. Any of: coverage, langmix, treemap, sunburst, calendar (calendar needs full git history, so fetch-depth: 0)."
    required: false
    default: "coverage langmix treemap sunburst"
  version:
    description: "git ref (tag, branch, or SHA) of fledge-plugin-atlas to install the CLI from. Defaults to the ref this action was called at, so `uses: ...@v1` pins the CLI to v1 too; falls back to main."
    required: false
    default: ""
  augur-token:
    description: "Token with read access to CorvidLabs/augur releases. When set, the action installs augur and lights the live augur trust chip; when empty, the augur chip stays dark and nothing else changes."
    required: false
    default: ""
  augur-version:
    description: "augur release tag to install the prebuilt Linux binary from."
    required: false
    default: "v0.4.1"

outputs:
  coverage:
    description: "Spec coverage as a whole-number percentage."
    value: ${{ steps.render.outputs.coverage }}
  orphans:
    description: "Number of source files governed by no spec."
    value: ${{ steps.render.outputs.orphans }}
  phantoms:
    description: "Number of spec-declared paths that do not exist on disk."
    value: ${{ steps.render.outputs.phantoms }}
  specs:
    description: "Number of specs found."
    value: ${{ steps.render.outputs.specs }}

runs:
  using: "composite"
  steps:
    - name: Install fledge-atlas
      shell: bash
      env:
        REF: ${{ inputs.version }}
      run: |
        repo=https://github.com/CorvidLabs/fledge-plugin-atlas
        # Default to the ref this action was invoked at, so `uses: ...@v1` pins
        # the CLI to v1 as well; fall back to main for a local/default checkout.
        REF="${REF:-$GITHUB_ACTION_REF}"
        REF="${REF:-main}"
        install() { cargo install --locked --git "$repo" --bin fledge-atlas "$@" fledge-plugin-atlas; }
        # A ref may be a tag, a branch, or a pinned commit SHA; try each in turn.
        install --tag "$REF" || install --branch "$REF" || install --rev "$REF"

    - name: Fetch attestation notes
      shell: bash
      working-directory: ${{ inputs.path }}
      # attest records provenance in refs/notes/attest, which a normal checkout
      # does not fetch. Pull every notes ref so atlas can read the ledger and
      # light the attest trust chip. A no-op (|| true) where no notes exist.
      run: git fetch origin '+refs/notes/*:refs/notes/*' --force || true

    - name: Install augur
      if: inputs.augur-token != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.augur-token }}
        AUGUR_VERSION: ${{ inputs.augur-version }}
      # Download the prebuilt static augur binary (verified by checksum) so the
      # atlas model can carry a live change-risk verdict. Gated on a token
      # because augur's releases are private; without one this step is skipped
      # and the augur chip simply stays dark.
      run: |
        gh release download "$AUGUR_VERSION" --repo CorvidLabs/augur \
          -p augur-linux-x86_64 -p augur-linux-x86_64.sha256 --dir "$RUNNER_TEMP"
        ( cd "$RUNNER_TEMP" && sha256sum -c augur-linux-x86_64.sha256 )
        chmod +x "$RUNNER_TEMP/augur-linux-x86_64"
        sudo mv "$RUNNER_TEMP/augur-linux-x86_64" /usr/local/bin/augur

    - name: Render atlas
      id: render
      shell: bash
      env:
        ATLAS_PATH: ${{ inputs.path }}
        OUT_DIR: ${{ inputs.output-dir }}
        COMPONENTS: ${{ inputs.components }}
        # Grade the last landed change, so a clean CI checkout still yields a
        # verdict. Harmless when augur is not installed (the spawn just fails).
        ATLAS_AUGUR_RANGE: "HEAD~1..HEAD"
      run: |
        mkdir -p "$OUT_DIR"
        fledge-atlas "$ATLAS_PATH" --json > "$OUT_DIR/atlas.json"
        for c in $COMPONENTS; do
          fledge-atlas "$ATLAS_PATH" --svg "$c" > "$OUT_DIR/$c.svg"
        done
        node -e '
          const fs = require("fs");
          const out = process.env.OUT_DIR;
          const m = JSON.parse(fs.readFileSync(`${out}/atlas.json`, "utf8"));
          const s = m.stats;
          const teal = "0e6f66", gold = "b07a1e", clay = "a0492e";
          const blue = "1e6fa8", gray = "5f6672", ink = "15181b";
          const band = p => (p >= 90 ? teal : p >= 60 ? gold : clay);
          const badge = (name, label, message, color) =>
            fs.writeFileSync(`${out}/${name}.json`,
              JSON.stringify({ schemaVersion: 1, label, message, color, labelColor: ink }));
          const pct = Math.round(s.coverage_pct);
          badge("coverage", "spec coverage", `${pct}%`, band(s.coverage_pct));
          badge("orphans", "orphans", String(s.orphan_files), s.orphan_files ? clay : teal);
          badge("phantoms", "phantoms", String(s.phantom_refs), s.phantom_refs ? clay : teal);
          badge("specs", "specs", String(s.specs), blue);
          badge("loc", "lines of code", s.total_loc.toLocaleString("en-US"), gray);
          const gh = process.env.GITHUB_OUTPUT;
          if (gh) fs.appendFileSync(gh,
            `coverage=${pct}\norphans=${s.orphan_files}\nphantoms=${s.phantom_refs}\nspecs=${s.specs}\n`);
          const sm = process.env.GITHUB_STEP_SUMMARY;
          if (sm) fs.appendFileSync(sm,
            `### Atlas\n\n${m.verdict}\n\n| coverage | orphans | phantoms | specs |\n|---|---|---|---|\n` +
            `| ${pct}% | ${s.orphan_files} | ${s.phantom_refs} | ${s.specs} |\n`);
          console.log(`atlas: ${pct}% coverage, ${s.orphan_files} orphans, ${s.phantom_refs} phantoms, ${s.specs} specs`);
        '

    - name: Append coverage history
      shell: bash
      env:
        OUT_DIR: ${{ inputs.output-dir }}
      run: |
        # Maintain an append-only spec-coverage time-series on Pages, so the
        # dashboard can show trajectory instead of a still frame. Fetch the
        # previously published history, append this commit's numbers, dedupe by
        # SHA, cap to a year of points, and write it back into the badges dir so
        # the next deploy carries it forward. Fully fail-safe: a 404 (first run),
        # an offline fetch, or a parse error just starts a fresh series, and a
        # node failure never breaks the badge deploy.
        owner="$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')"
        name="${GITHUB_REPOSITORY#*/}"
        name_lower="$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')"
        # A user/org Pages repo (named <owner>.github.io) publishes at the domain
        # root; every other (project) repo publishes under /<repo>/.
        if [ "$name_lower" = "${owner}.github.io" ]; then
          rel="badges/history.json"
        else
          rel="${name}/badges/history.json"
        fi
        curl -fsSL "https://${owner}.github.io/${rel}" \
          -o "$OUT_DIR/history.prev.json" 2>/dev/null || printf '[]' > "$OUT_DIR/history.prev.json"
        node -e '
          const fs = require("fs");
          const out = process.env.OUT_DIR;
          const s = JSON.parse(fs.readFileSync(`${out}/atlas.json`, "utf8")).stats;
          let hist = [];
          try { hist = JSON.parse(fs.readFileSync(`${out}/history.prev.json`, "utf8")); } catch {}
          if (!Array.isArray(hist)) hist = [];
          const sha = (process.env.GITHUB_SHA || "").slice(0, 7);
          const entry = {
            date: new Date().toISOString().slice(0, 10),
            sha,
            coverage: Math.round(s.coverage_pct),
            orphans: s.orphan_files,
            phantoms: s.phantom_refs,
            specs: s.specs,
            loc: s.total_loc,
          };
          hist = hist.filter(h => h && h.sha !== sha).concat(entry);
          if (hist.length > 365) hist = hist.slice(hist.length - 365);
          fs.writeFileSync(`${out}/history.json`, JSON.stringify(hist));
          console.log(`atlas history: ${hist.length} point(s), latest ${entry.coverage}% @ ${entry.sha || "?"}`);
        ' || echo "::warning::atlas history step failed; skipping this point"
        rm -f "$OUT_DIR/history.prev.json"
