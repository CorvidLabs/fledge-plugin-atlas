name: Deploy atlas web app

# Builds the WASM engine and publishes web/app to GitHub Pages, and alongside it
# renders this repo's own atlas as badges + SVG components under /badges. Enable
# Pages for the repo (Settings -> Pages -> Source: GitHub Actions) once, then
# every push to main that touches the engine, the app, or the specs redeploys.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "web/app/**"
      - "specs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            crates/atlas-wasm/target
          key: pages-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/atlas-core/**/*.rs') }}

      # Cache the pinned atlas CLI the reusable action installs, so the render is
      # a fast no-op on a cache hit. Keyed to the commit `v1` resolves to.
      - name: Resolve pinned atlas commit (cache key)
        id: atlasref
        run: echo "sha=$(git ls-remote https://github.com/CorvidLabs/fledge-plugin-atlas v1 | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache the fledge-atlas CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/fledge-atlas
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: fledge-atlas-${{ runner.os }}-${{ steps.atlasref.outputs.sha }}

      # Dogfood the published action to render THIS repo's own atlas, BEFORE the
      # WASM pkg is built (web/app/pkg does not exist yet, so it never counts as
      # orphan code and the atlas governs itself at 100%). Unlike the old
      # hand-rolled render, the action also publishes atlas.json + history.json
      # and the augur/attest trust panel, so this repo's own /trust/ row is
      # complete instead of a 404.
      - name: Render self-atlas (badges + atlas.json + history + trust)
        uses: CorvidLabs/fledge-plugin-atlas@v1
        with:
          path: .
          output-dir: web/app/badges
          components: "coverage langmix treemap sunburst calendar"

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM into web/app/pkg
        # wasm-pack resolves --out-dir relative to the crate, so it must be
        # absolute to land under the repo-root web/app that Pages uploads.
        run: |
          wasm-pack build crates/atlas-wasm --target web --release \
            --out-dir "$GITHUB_WORKSPACE/web/app/pkg" --out-name atlas
          test -f web/app/pkg/atlas.js && test -f web/app/pkg/atlas_bg.wasm \
            || { echo "::error::wasm pkg missing from web/app/pkg after build"; exit 1; }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/app

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
